<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sadananda Paul | Socials</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Oswald:wght@500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #0b1f18;
            /* Dark forest green */
            --card-color: #ebf5e1;
            /* Pale cream/green */
            --text-light: #ebf5e1;
            --text-dark: #0b1f18;
            --accent-yellow: #dbb32d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('../bgtest2.avif');
            /* Relative to findme/ folder */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding-bottom: 50px;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated background particles from homepage */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(-20px) rotate(180deg);
            }
        }

        .container {
            width: 100%;
            max-width: 680px;
            padding: 40px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 2;
            /* Ensure it stays above particles */
        }

        /* Top utility buttons */
        .top-btn {
            position: absolute;
            top: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(235, 245, 225, 0.2);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            color: var(--text-light);
            transition: background 0.2s;
        }

        .top-btn:hover {
            background: rgba(235, 245, 225, 0.3);
        }

        .top-left {
            left: 16px;
        }

        .top-right {
            right: 16px;
        }

        /* Profile Block Glassmorphism Card */
        .profile-card {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            /* Same as other cards */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            border-radius: 40px;
            padding: 30px 20px 10px 20px;
            margin-bottom: 24px;
        }

        .profile-pic {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            background-color: #222;
        }

        .name {
            font-size: 1.6rem;
            font-weight: 900;
            margin-bottom: 12px;
            text-align: center;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            /* extra pop */
        }

        .bio {
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
            max-width: 320px;
            margin-bottom: 24px;
            line-height: 1.3;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        /* Social Icons */
        .socials {
            display: flex;
            gap: 16px;
            margin-bottom: 30px;
        }

        .socials a {
            color: var(--text-light);
            font-size: 1.6rem;
            text-decoration: none;
            transition: transform 0.2s;
        }

        .socials a:hover {
            transform: scale(1.1);
        }

        /* Link Cards container */
        .links {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 50px;
        }

        /* Standard Card Style */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            color: #ffffff;
            border-radius: 50px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            text-decoration: none;
            position: relative;
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.1);
        }

        .card-icon-left {
            position: absolute;
            left: 10px;
            width: 44px;
            height: 44px;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-icon-left img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-content {
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .card-subtitle {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 0.75rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 4px;
        }

        .card-dots {
            position: absolute;
            right: 16px;
            font-size: 0.9rem;
            opacity: 0.4;
        }

        /* Featured YouTube Card */
        .card-featured {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            color: #ffffff;
            border-radius: 20px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, background 0.3s ease;
            overflow: hidden;
        }

        .card-featured:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.1);
        }

        .featured-banner {
            width: 100%;
            height: 220px;
            object-fit: cover;
            object-position: center;
        }

        .featured-bottom {
            padding: 18px 16px;
            text-align: center;
            font-weight: 800;
            font-size: 1rem;
            position: relative;
        }

        /* Specific icon overrides */
        .icon-insta {
            font-size: 26px;
        }

        .icon-linkedin {
            background-color: #0077b5;
            color: #ffffff;
            font-size: 22px;
        }

        .icon-x {
            background-color: #000000;
            color: #ffffff;
            font-size: 20px;
        }

        .icon-spotify-art {
            background-color: var(--accent-yellow);
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            font-family: 'Great Vibes', cursive;
            font-size: 10px;
            line-height: 1;
            padding: 5px;
            text-align: center;
        }

        .icon-wave {
            background: transparent;
            font-size: 28px;
            background: linear-gradient(90deg, #ff416c, #ff4b2b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Bottom Gradient Fade Overlay */
        .bottom-gradient {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 300px;
            /* Slightly taller for a smoother fade */
            background: linear-gradient(to top, rgba(255, 255, 255, 1) 0%, rgba(255, 255, 255, 0.5) 40%, rgba(255, 255, 255, 0) 100%);
            pointer-events: none;
            /* Allows clicking through the gradient */
            z-index: 1;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .container {
                padding: 30px 15px;
            }

            .profile-card {
                padding: 24px 15px 10px 15px;
            }

            .profile-pic {
                width: 80px;
                height: 80px;
            }

            .name {
                font-size: 1.4rem;
            }

            .bio {
                font-size: 0.95rem;
            }

            .card-title {
                font-size: 1rem;
            }

            .featured-banner {
                height: 160px;
            }
        }

        @media (max-width: 480px) {
            .name {
                font-size: 1.25rem;
            }

            .bio {
                font-size: 0.85rem;
            }

            .featured-banner {
                height: 130px;
            }
        }
    </style>
</head>

<body>

</body>
