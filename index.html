<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASHUP VERGE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('bgtest2.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background particles */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(-20px) rotate(180deg);
            }
        }

        /* Glassmorphic container */
        .container {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 60px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            text-align: center;
            max-width: 800px;
            width: 90%;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Navbar styling */
        .navbar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 96%;
            /* wide span like the image */
            max-width: 1400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px 10px 30px;
            background: rgba(255, 255, 255, 0.98);
            /* Solid white aesthetic */
            border-radius: 24px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            /* very faint shadow */
            z-index: 10;
        }

        .nav-logo {
            font-size: 1.4rem;
            font-weight: 700;
            color: #000;
            letter-spacing: -0.5px;
        }

        .nav-logo span {
            color: #2563eb;
            /* Small blue accent */
        }

        .nav-links {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .nav-link {
            text-decoration: none;
            color: #333333;
            /* Dark grey/black for contrast */
            font-size: 0.85rem;
            font-weight: 500;
            padding: 10px 20px;
            border-radius: 14px;
            transition: all 0.2s ease;
        }

        .nav-link:hover {
            color: #000;
            background: #f1f5f9;
            /* Subtle gray highlight like the image */
        }

        /* Outline button style matching the rightmost button in the image */
        .nav-btn {
            border: 1px solid #e2e8f0;
            background: transparent;
        }

        .nav-btn:hover {
            border-color: #cbd5e1;
            background: #ffffff;
        }

        /* Title styling */
        .title {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.2;
        }

        /* Subtitle/Coming Soon text */
        .subtitle {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 40px;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }


        /* Responsive design */
        @media (max-width: 768px) {
            .navbar {
                width: 94%;
                padding: 15px;
                flex-direction: column;
                gap: 15px;
                justify-content: center;
                border-radius: 20px;
            }

            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }

            .nav-link {
                font-size: 0.85rem;
                padding: 8px 16px;
            }

            .title {
                font-size: 2.5rem;
            }

            .subtitle {
                font-size: 1.2rem;
            }

            .container {
                padding: 40px 20px;
            }
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-logo">Mashup Verge<span>.</span></div>
        <div class="nav-links">
            <a href="#" class="nav-link">Home</a>
            <a href="#" class="nav-link">About</a>
            <a href="findme/index.html" class="nav-link">Social</a>
            <a href="#" class="nav-link nav-btn">Contact</a>
        </div>
    </nav>

    <!-- Animated background particles -->
    <div class="particles" id="particles"></div>

    <!-- Main content -->
    <div class="container">
        <h1 class="title">MASHUP VERGE</h1>
        <p class="subtitle">Coming Soon</p>
    </div>

    <script>
        // Create animated particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');

                // Random properties
                const size = Math.random() * 4 + 1;
                const posX = Math.random() * 100;
                const posY = Math.random() * 100;
                const delay = Math.random() * 6;
                const duration = Math.random() * 3 + 3;

                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = posX + '%';
                particle.style.top = posY + '%';
                particle.style.animationDelay = delay + 's';
                particle.style.animationDuration = duration + 's';

                particlesContainer.appendChild(particle);
            }
        }

        // Initialize
        createParticles();
    </script>
</body>

</html>
